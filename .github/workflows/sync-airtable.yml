name: Sync Airtable to GitHub Pages

on:
  schedule:
    # Run every 5 minutes
    - cron: '*/5 * * * *'
  # Manual trigger in GitHub UI
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch Airtable Data (via Personal Access Token)
        id: airtable
        run: |
          curl -X GET \
            "https://api.airtable.com/v0/${{ secrets.AIRTABLE_BASE_ID }}/Inventory%20Reservations" \
            -H "Authorization: Bearer ${{ secrets.AIRTABLE_PERSONAL_TOKEN }}" \
            -o airtable_raw.json

      - name: Transform Airtable Data
        run: |
          node .github/workflows/transform.js

      - name: Commit & Push
        run: |
          git config user.name "Airtable Sync Bot"
          git config user.email "sync@example.com"
          git add data.json
          git commit -m "chore: sync reservations from Airtable [skip ci]" || echo "No changes to commit"
          git push

      - name: Debug - Show File
        if: failure()
        run: |
          echo "=== airtable_raw.json ==="
          head -100 airtable_raw.json || echo "File not found"
          echo "=== data.json ==="
          head -100 data.json || echo "File not found"

